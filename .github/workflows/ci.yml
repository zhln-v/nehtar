name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  bot:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bot

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/orbit_escape_bot?schema=public
          SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/orbit_escape_bot_shadow?schema=public
        run: bun run prisma:generate

      - name: Build bot image
        run: docker build -t orbit-escape-bot-ci .

  compose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare temporary env files
        run: |
          cp bot/.env.example bot/.env
          cp remnawave/.env.example remnawave/.env
          cp remnawave/subscription/.env.example remnawave/subscription/.env

      - name: Validate docker compose
        run: docker compose config
